[options]
isa rv32imc

[depth]
insn            35
reg       15    25
pc_fwd    10    30
pc_bwd    10    30
liveness  1  10 30
hang      1     20
unique    1  10 30
causal    10    30
cover     1     45
csrw            20
csr_ill         20
trap_handler    20
priv_insn       20
interrupt       20
csrc_any   1    5
csrc_const 1    5

[sort]
reg_ch0

[csrs]
# mstatus: only MIE (bit 3) and MPIE (bit 7) are writable
mstatus     any_mask="32'h 00000088"
# mie: only MSIE (3), MTIE (7), MEIE (11) are writable
mie         any_mask="32'h 00000888"
# mepc: bit 0 is hardwired to 0 (IALIGN=32, exclude also bit 1 is writable for RVC)
mepc        any_mask="32'h fffffffe"

# misa: hardwired to RV32IMC (bit30=MXL01, bit12=M, bit8=I, bit2=C)
misa        const="32'h 40001104"

# Fully RW CSRs: verified with the strict csrw check
mcause
mtvec
mscratch

[filter-checks]
- csrw_misa_ch.*

[defines]
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_ALTOPS
`define RISCV_FORMAL_COMPRESSED
`define RISCV_FORMAL_CSR_MSTATUS
`define RISCV_FORMAL_CSR_MTVEC
`define RISCV_FORMAL_CSR_MEPC
`define RISCV_FORMAL_CSR_MCAUSE
# Uncomment the following line to use Cl1Top (native bus) instead of Cl1Top_AXI
`define CL1_USE_NATIVE_BUS

[defines hang]
`define RISCV_FORMAL_DEADLOCK_ENV

[defines liveness]
`define RISCV_FORMAL_DEADLOCK_ENV

[defines interrupt]
`define RISCV_FORMAL_INTERRUPT

[cover]
wire        ch0_valid      = channel[0].valid;
wire [31:0] ch0_insn       = channel[0].insn;
wire [31:0] ch0_rs2_rdata  = channel[0].rs2_rdata;
wire [31:0] ch0_pc_rdata   = channel[0].pc_rdata;
wire [31:0] ch0_pc_wdata   = channel[0].pc_wdata;

wire ch0_is_load  = ch0_valid && ch0_insn[6:0] == 7'b0000011;
wire ch0_is_store = ch0_valid && ch0_insn[6:0] == 7'b0100011;
wire ch0_is_divrem = ch0_valid &&
	ch0_insn[6:0]   == 7'b0110011 &&
	ch0_insn[31:25] == 7'b0000001 &&
	(ch0_insn[14:12] == 3'b100 ||
	 ch0_insn[14:12] == 3'b101 ||
	 ch0_insn[14:12] == 3'b110 ||
	 ch0_insn[14:12] == 3'b111);

reg prev_ch0_is_load;
reg prev_ch0_is_store;
reg seen_ch0_load_store;
reg seen_ch0_store_load;
reg seen_ch0_divrem_zero;
reg seen_ch0_trap;
reg seen_ch0_nonseq_pc;

always @(posedge clock) begin
	if (reset) begin
		prev_ch0_is_load    <= 1'b0;
		prev_ch0_is_store   <= 1'b0;
		seen_ch0_load_store <= 1'b0;
		seen_ch0_store_load <= 1'b0;
		seen_ch0_divrem_zero <= 1'b0;
		seen_ch0_trap       <= 1'b0;
		seen_ch0_nonseq_pc  <= 1'b0;
	end else begin
		prev_ch0_is_load    <= ch0_is_load;
		prev_ch0_is_store   <= ch0_is_store;
		seen_ch0_load_store <= seen_ch0_load_store || (prev_ch0_is_load && ch0_is_store);
		seen_ch0_store_load <= seen_ch0_store_load || (prev_ch0_is_store && ch0_is_load);
		seen_ch0_divrem_zero <= seen_ch0_divrem_zero || (ch0_is_divrem && ch0_rs2_rdata == 32'h00000000);
		seen_ch0_trap       <= seen_ch0_trap || (ch0_valid && channel[0].trap);
		seen_ch0_nonseq_pc  <= seen_ch0_nonseq_pc || (ch0_valid && !channel[0].trap && ch0_pc_wdata != ch0_pc_rdata + 32'd4);
	end
end

always @* if (!reset) cover (channel[0].cnt_insns >= 2 && seen_ch0_load_store && seen_ch0_store_load && seen_ch0_divrem_zero && seen_ch0_trap && seen_ch0_nonseq_pc);

[script-sources]
read_verilog -sv @basedir@/cores/@core@/wrapper.sv
read_verilog -sv @basedir@/cores/@core@/Cl1Top.sv
# For native-bus verification (`define CL1_USE_NATIVE_BUS), use Cl1Top.sv only.
# Cl1Top_AXI.sv also defines module Cl1Top and must not be loaded together.
